name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build NAICS database
        run: bun run --cwd packages/naics-api build-db

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build govdata CLI
        run: bun build packages/govdata-cli/src/cli.ts --compile --outfile dist/govdata

      - name: Build govdata MCP server
        run: bun build packages/govdata-mcp/src/mcp.ts --compile --outfile dist/govdata-mcp

      - name: Package release archive
        run: |
          mkdir -p staging/data
          cp dist/govdata staging/
          cp dist/govdata-mcp staging/
          cp packages/naics-api/data/*.db staging/data/
          cd staging
          tar czf ../govdata-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: govdata-${{ matrix.target }}
          path: govdata-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: govdata-*.tar.gz
