name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build NAICS database
        run: bun run --cwd packages/naics-api build-db

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build govdata CLI
        run: bun build packages/govdata-cli/src/cli.ts --compile --outfile dist/govdata

      - name: Build govdata MCP server
        run: bun build packages/govdata-mcp/src/mcp.ts --compile --outfile dist/govdata-mcp

      - name: Package release archive
        run: |
          mkdir -p staging/data
          cp dist/govdata staging/
          cp dist/govdata-mcp staging/
          cp packages/naics-api/data/*.db staging/data/
          cd staging
          tar czf ../govdata-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: govdata-${{ matrix.target }}
          path: govdata-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="nightly-${SHORT_SHA}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing nightly tag (if updating)
        if: steps.version.outputs.prerelease == 'true'
        run: gh release delete "${{ steps.version.outputs.tag }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: govdata-*.tar.gz
