name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun test

  version:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: tag
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            # Tag exists — append short SHA to make a unique patch release
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="v${VERSION}-${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Will release as $TAG"

      - name: Create tag
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

  build:
    needs: [test, version]
    if: always() && (needs.version.result == 'success' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: doge-api-linux-x64
            artifact_mcp: doge-mcp-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: doge-api-linux-arm64
            artifact_mcp: doge-mcp-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: doge-api-darwin-x64
            artifact_mcp: doge-mcp-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: doge-api-darwin-arm64
            artifact_mcp: doge-mcp-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun build src/cli.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - name: Build MCP server
        run: bun build src/mcp.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact_mcp }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact_mcp }}

  release:
    needs: [build, version]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: chmod +x artifacts/*

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
